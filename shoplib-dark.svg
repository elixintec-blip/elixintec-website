<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 180" width="560" height="180">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE566"/>
      <stop offset="45%" style="stop-color:#FFD700"/>
      <stop offset="75%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE566"/>
      <stop offset="50%" style="stop-color:#C8960C"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="560" height="180" fill="#080808" rx="0"/>

  <!-- ===== ICON: Diamond + S monogram ===== -->
  <!-- Outer diamond -->
  <polygon points="75,18 128,71 75,124 22,71" fill="none" stroke="url(#gold)" stroke-width="2.5" filter="url(#softglow)"/>
  <!-- Inner diamond -->
  <polygon points="75,30 116,71 75,112 34,71" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
  <!-- S letter inside -->
  <text x="75" y="85"
    font-family="'Palatino Linotype', Georgia, serif"
    font-size="52"
    font-weight="bold"
    fill="url(#gold)"
    text-anchor="middle"
    filter="url(#softglow)">S</text>
  <!-- Top dot -->
  <circle cx="75" cy="12" r="3.5" fill="url(#gold)"/>
  <!-- Bottom dot -->
  <circle cx="75" cy="130" r="3.5" fill="url(#gold)"/>
  <!-- Left dot -->
  <circle cx="16" cy="71" r="3.5" fill="url(#gold)"/>
  <!-- Right dot -->
  <circle cx="134" cy="71" r="3.5" fill="url(#gold)"/>

  <!-- Vertical separator line -->
  <line x1="158" y1="28" x2="158" y2="114" stroke="#C8960C" stroke-width="1" opacity="0.6"/>

  <!-- ===== BRAND NAME ===== -->
  <text x="355" y="84"
    font-family="'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif"
    font-size="58"
    font-weight="bold"
    fill="url(#gold)"
    text-anchor="middle"
    letter-spacing="10"
    filter="url(#glow)">SHOPLIB</text>

  <!-- Thin line under name -->
  <line x1="178" y1="100" x2="532" y2="100" stroke="url(#gold)" stroke-width="0.7" opacity="0.5"/>

  <!-- Left ornament -->
  <text x="185" y="99" font-size="10" fill="#C8960C" font-family="serif">✦</text>
  <!-- Right ornament -->
  <text x="518" y="99" font-size="10" fill="#C8960C" font-family="serif">✦</text>

  <!-- Tagline -->
  <text x="355" y="128"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="11"
    fill="#C8960C"
    text-anchor="middle"
    letter-spacing="6">LUXURY PERFUMES · LIBYA</text>

  <!-- Arabic subtitle -->
  <text x="355" y="153"
    font-family="'Palatino Linotype', Georgia, serif"
    font-size="13"
    fill="#666"
    text-anchor="middle"
    letter-spacing="3">عطور فاخرة</text>
</svg>
