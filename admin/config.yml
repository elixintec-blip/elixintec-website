backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: fr

collections:
  - name: "settings"
    label: "Parametres du site"
    files:
      - label: "Informations generales"
        name: "general"
        file: "_data/settings.json"
        fields:
          - {label: "Telephone", name: "phone", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Adresse", name: "address", widget: "string"}
          - {label: "WhatsApp", name: "whatsapp", widget: "string"}
          - {label: "Stat 1 - Projets", name: "stat_projets", widget: "string"}
          - {label: "Stat 2 - Annees experience", name: "stat_experience", widget: "string"}
          - {label: "Stat 3 - Villes", name: "stat_villes", widget: "string"}

  - name: "realisations"
    label: "Realisations"
    files:
      - label: "Liste des realisations"
        name: "realisations_list"
        file: "_data/realisations.json"
        fields:
          - label: "Realisations"
            name: "items"
            widget: "list"
            fields:
              - {label: "Titre", name: "title", widget: "string"}
              - {label: "Categorie", name: "category", widget: "select", options: [{label: "Domotique", value: "domotique"}, {label: "Home Cinema", value: "cinema"}, {label: "Reseau WiFi", value: "reseau"}, {label: "CFA / Courant Faible", value: "cfa"}, {label: "Securite", value: "securite"}, {label: "Sonorisation", value: "sono"}]}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Localisation", name: "location", widget: "string"}
              - {label: "Tags (virgule separateur)", name: "tags", widget: "list", required: false}
              - {label: "Image (optionnel)", name: "image", widget: "image", required: false}

  - name: "blog"
    label: "Articles Blog"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Titre", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Image de couverture", name: "image", widget: "image", required: false}
      - {label: "Resume", name: "summary", widget: "text"}
      - {label: "Contenu", name: "body", widget: "markdown"}
      - {label: "Categorie", name: "category", widget: "select", options: ["Domotique", "CFA", "KNX", "Reseau WiFi", "Sonorisation", "Home Cinema", "Securite"]}
