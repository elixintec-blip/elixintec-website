backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: fr

collections:
  - name: "settings"
    label: "Parametres du site"
    files:
      - label: "Informations generales"
        name: "general"
        file: "_data/settings.json"
        fields:
          - {label: "Telephone", name: "phone", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Adresse", name: "address", widget: "string"}
          - {label: "WhatsApp", name: "whatsapp", widget: "string"}
          - {label: "Stat 1 - Projets", name: "stat_projets", widget: "string"}
          - {label: "Stat 2 - Annees experience", name: "stat_experience", widget: "string"}
          - {label: "Stat 3 - Villes", name: "stat_villes", widget: "string"}

  - name: "services"
    label: "Pages Services"
    files:
      - label: "Contenu des services"
        name: "services_content"
        file: "_data/services.json"
        fields:
          - label: "Services"
            name: "services"
            widget: "list"
            fields:
              - {label: "Service (ne pas modifier)", name: "slug", widget: "string"}
              - {label: "Photo Hero (optionnel)", name: "hero_image", widget: "image", required: false}
              - {label: "Titre de la section intro", name: "intro_title", widget: "string"}
              - {label: "Description principale", name: "intro_text", widget: "text"}
              - label: "Liste des prestations"
                name: "features"
                widget: "list"

  - name: "realisations"
    label: "Realisations"
    files:
      - label: "Liste des realisations"
        name: "realisations_list"
        file: "_data/realisations.json"
        fields:
          - label: "Realisations"
            name: "items"
            widget: "list"
            fields:
              - {label: "Titre", name: "title", widget: "string"}
              - {label: "Categorie", name: "category", widget: "select", options: [{label: "Domotique", value: "domotique"}, {label: "Home Cinema", value: "cinema"}, {label: "Reseau WiFi", value: "reseau"}, {label: "CFA / Courant Faible", value: "cfa"}, {label: "Securite", value: "securite"}, {label: "Sonorisation", value: "sono"}]}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Localisation", name: "location", widget: "string"}
              - {label: "Tags (virgule separateur)", name: "tags", widget: "list", required: false}
              - {label: "Image (optionnel)", name: "image", widget: "image", required: false}

  - name: "blog"
    label: "Articles Blog"
    files:
      - label: "Liste des articles"
        name: "blog_list"
        file: "_data/blog.json"
        fields:
          - label: "Articles"
            name: "posts"
            widget: "list"
            fields:
              - {label: "Slug (ex: mon-article)", name: "slug", widget: "string"}
              - {label: "Titre", name: "title", widget: "string"}
              - {label: "Date (YYYY-MM-DD)", name: "date", widget: "string"}
              - {label: "Categorie", name: "category", widget: "select", options: ["Domotique", "Home Cinema", "Reseau & WiFi", "Sonorisation", "Securite", "Courant Faible", "Multiroom Audio", "Smart Home", "Conseils"]}
              - {label: "Resume", name: "summary", widget: "text"}
              - {label: "Temps de lecture (min)", name: "readTime", widget: "string"}
              - {label: "Image URL ou upload", name: "image", widget: "image", required: false}
