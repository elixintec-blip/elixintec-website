<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" width="500" height="220">
  <defs>
    <!-- Gold gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#FFF0A0;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#C8960C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    <!-- Gold gradient for icon -->
    <linearGradient id="bottleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE066;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C8960C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A07000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0.0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="220" fill="#0A0A0A" rx="14"/>

  <!-- Decorative corner lines -->
  <line x1="18" y1="14" x2="50" y2="14" stroke="#C8960C" stroke-width="1.2"/>
  <line x1="18" y1="14" x2="18" y2="46" stroke="#C8960C" stroke-width="1.2"/>
  <line x1="482" y1="14" x2="450" y2="14" stroke="#C8960C" stroke-width="1.2"/>
  <line x1="482" y1="14" x2="482" y2="46" stroke="#C8960C" stroke-width="1.2"/>
  <line x1="18" y1="206" x2="50" y2="206" stroke="#C8960C" stroke-width="1.2"/>
  <line x1="18" y1="206" x2="18" y2="174" stroke="#C8960C" stroke-width="1.2"/>
  <line x1="482" y1="206" x2="450" y2="206" stroke="#C8960C" stroke-width="1.2"/>
  <line x1="482" y1="206" x2="482" y2="174" stroke="#C8960C" stroke-width="1.2"/>

  <!-- ===== PERFUME BOTTLE ICON ===== -->
  <!-- Bottle cap top -->
  <rect x="60" y="42" width="36" height="8" rx="3" fill="url(#bottleGrad)"/>
  <!-- Bottle neck -->
  <rect x="67" y="50" width="22" height="16" rx="2" fill="url(#bottleGrad)"/>
  <!-- Collar ring -->
  <rect x="63" y="63" width="30" height="6" rx="2" fill="url(#goldGrad)"/>
  <!-- Bottle body -->
  <rect x="52" y="69" width="52" height="78" rx="10" fill="url(#bottleGrad)"/>
  <!-- Shimmer on body -->
  <rect x="52" y="69" width="52" height="78" rx="10" fill="url(#shimmer)"/>
  <!-- Highlight on bottle -->
  <rect x="58" y="76" width="10" height="50" rx="5" fill="white" opacity="0.12"/>
  <!-- Bottle base -->
  <rect x="50" y="144" width="56" height="6" rx="3" fill="url(#goldGrad)"/>
  <!-- Decorative label on bottle -->
  <rect x="60" y="85" width="36" height="44" rx="4" fill="#0A0A0A" opacity="0.35"/>
  <text x="78" y="107" font-family="Georgia, serif" font-size="8" fill="#FFD700" text-anchor="middle" letter-spacing="1">شوب</text>
  <text x="78" y="120" font-family="Georgia, serif" font-size="7" fill="#FFD700" text-anchor="middle" letter-spacing="1">ليب</text>
  <!-- Spray nozzle -->
  <rect x="88" y="54" width="16" height="5" rx="2" fill="url(#goldGrad)"/>
  <rect x="102" y="50" width="5" height="14" rx="2" fill="url(#bottleGrad)"/>
  <!-- Spray mist dots -->
  <circle cx="112" cy="46" r="1.5" fill="#FFD700" opacity="0.7"/>
  <circle cx="118" cy="43" r="1" fill="#FFD700" opacity="0.5"/>
  <circle cx="115" cy="38" r="1.2" fill="#FFD700" opacity="0.4"/>
  <circle cx="122" cy="49" r="0.9" fill="#FFD700" opacity="0.45"/>
  <circle cx="120" cy="35" r="0.8" fill="#FFD700" opacity="0.3"/>

  <!-- ===== BRAND NAME ===== -->
  <text x="270" y="105"
    font-family="'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif"
    font-size="62"
    font-weight="bold"
    fill="url(#goldGrad)"
    text-anchor="middle"
    letter-spacing="8"
    filter="url(#glow)">SHOPLIB</text>

  <!-- Thin gold separator line -->
  <line x1="148" y1="120" x2="392" y2="120" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.8"/>

  <!-- Subtitle in Arabic -->
  <text x="270" y="148"
    font-family="'Palatino Linotype', Georgia, serif"
    font-size="15"
    fill="#C8960C"
    text-anchor="middle"
    letter-spacing="4">عطور فاخرة  ·  ليبيا</text>

  <!-- Small diamonds as decorators -->
  <polygon points="148,120 152,115 156,120 152,125" fill="#C8960C" opacity="0.8"/>
  <polygon points="388,120 392,115 396,120 392,125" fill="#C8960C" opacity="0.8"/>

  <!-- Bottom tagline -->
  <text x="270" y="178"
    font-family="Georgia, serif"
    font-size="9"
    fill="#666"
    text-anchor="middle"
    letter-spacing="5">LUXURY PERFUMES</text>
</svg>
