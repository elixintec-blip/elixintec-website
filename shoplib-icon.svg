<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE566"/>
      <stop offset="45%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Black circle background -->
  <circle cx="100" cy="100" r="98" fill="#080808"/>
  <circle cx="100" cy="100" r="98" fill="none" stroke="url(#gold)" stroke-width="2"/>

  <!-- Diamond shape -->
  <polygon points="100,12 172,100 100,188 28,100" fill="none" stroke="url(#gold)" stroke-width="3" filter="url(#glow)"/>
  <!-- Inner diamond subtle -->
  <polygon points="100,28 156,100 100,172 44,100" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>

  <!-- S letter -->
  <text x="100" y="118"
    font-family="'Palatino Linotype', Georgia, serif"
    font-size="82" font-weight="bold"
    fill="url(#gold)" text-anchor="middle"
    filter="url(#glow)">S</text>

  <!-- Corner dots -->
  <circle cx="100" cy="5" r="5" fill="url(#gold)"/>
  <circle cx="100" cy="195" r="5" fill="url(#gold)"/>
  <circle cx="5" cy="100" r="5" fill="url(#gold)"/>
  <circle cx="195" cy="100" r="5" fill="url(#gold)"/>
</svg>
