  <!-- Latitude lines -->
  <ellipse cx="60" cy="26"  rx="36" ry="9"  fill="none" stroke="white" stroke-width="1.8" opacity="0.9"/>
  <ellipse cx="60" cy="60"  rx="52" ry="13" fill="none" stroke="white" stroke-width="1.8" opacity="0.9"/>
  <ellipse cx="60" cy="94"  rx="36" ry="9"  fill="none" stroke="white" stroke-width="1.8" opacity="0.9"/>

  <!-- Longitude lines -->
