<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 180" width="560" height="180">
  <defs>
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6914"/>
      <stop offset="40%" style="stop-color:#B8860B"/>
      <stop offset="70%" style="stop-color:#8B6914"/>
      <stop offset="100%" style="stop-color:#A07010"/>
    </linearGradient>
  </defs>

  <!-- Background white -->
  <rect width="560" height="180" fill="#FFFFFF" rx="0"/>
  <!-- Subtle warm border -->
  <rect width="560" height="180" fill="none" stroke="#C8960C" stroke-width="1.5" rx="0" opacity="0.3"/>

  <!-- ===== ICON: Diamond + S ===== -->
  <polygon points="75,18 128,71 75,124 22,71" fill="none" stroke="url(#goldDark)" stroke-width="2.5"/>
  <polygon points="75,30 116,71 75,112 34,71" fill="none" stroke="url(#goldDark)" stroke-width="1" opacity="0.3"/>
  <text x="75" y="85"
    font-family="'Palatino Linotype', Georgia, serif"
    font-size="52" font-weight="bold"
    fill="url(#goldDark)" text-anchor="middle">S</text>
  <circle cx="75" cy="12" r="3.5" fill="url(#goldDark)"/>
  <circle cx="75" cy="130" r="3.5" fill="url(#goldDark)"/>
  <circle cx="16" cy="71" r="3.5" fill="url(#goldDark)"/>
  <circle cx="134" cy="71" r="3.5" fill="url(#goldDark)"/>

  <!-- Separator -->
  <line x1="158" y1="28" x2="158" y2="114" stroke="#B8860B" stroke-width="1" opacity="0.5"/>

  <!-- ===== BRAND NAME ===== -->
  <text x="355" y="84"
    font-family="'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif"
    font-size="58" font-weight="bold"
    fill="#111111" text-anchor="middle" letter-spacing="10">SHOPLIB</text>

  <line x1="178" y1="100" x2="532" y2="100" stroke="#B8860B" stroke-width="0.7" opacity="0.5"/>
  <text x="185" y="99" font-size="10" fill="#B8860B" font-family="serif">✦</text>
  <text x="518" y="99" font-size="10" fill="#B8860B" font-family="serif">✦</text>

  <text x="355" y="128"
    font-family="Georgia, serif" font-size="11"
    fill="#8B6914" text-anchor="middle" letter-spacing="6">LUXURY PERFUMES · LIBYA</text>

  <text x="355" y="153"
    font-family="'Palatino Linotype', Georgia, serif" font-size="13"
    fill="#AAA" text-anchor="middle" letter-spacing="3">عطور فاخرة</text>
</svg>
