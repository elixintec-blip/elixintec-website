<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <title>Supprimer fond blanc – Logo ELIXINTEC</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 60px auto; padding: 24px; background: #f4f7fb; }
    h2 { color: #1E3A6E; margin-bottom: 8px; }
    p  { color: #64748B; margin-bottom: 24px; }
    canvas { display: none; }
    .preview-area {
      display: flex; gap: 32px; align-items: flex-start; margin-bottom: 32px; flex-wrap: wrap;
    }
    .preview-box {
      flex: 1; min-width: 200px; border-radius: 12px; padding: 24px; text-align: center;
    }
    .dark-bg  { background: #1E3A6E; }
    .white-bg { background: #fff; border: 1px solid #E2E8F0; }
    .preview-box img { max-height: 80px; width: auto; }
    .preview-box span { display: block; font-size: 0.75rem; margin-top: 8px; }
    .dark-bg  span { color: rgba(255,255,255,0.6); }
    .white-bg span { color: #64748B; }
    .btn-dl {
      display: inline-block; background: #1E3A6E; color: white;
      padding: 14px 32px; border-radius: 10px; font-size: 1rem;
      font-weight: 700; text-decoration: none; cursor: pointer;
      border: none; font-family: inherit;
    }
    .btn-dl:hover { background: #2D5BA0; }
    .status { margin-top: 16px; color: #10B981; font-weight: 600; display: none; }
  </style>
</head>
<body>
  <h2>Outil : Supprimer le fond blanc du Logo</h2>
  <p>Cet outil rend le fond blanc du logo transparent pour qu'il s'affiche correctement sur la navbar sombre.</p>

  <div class="preview-area">
    <div class="preview-box dark-bg">
      <img id="previewDark" src="" alt="" />
      <span>Sur fond sombre (navbar)</span>
    </div>
    <div class="preview-box white-bg">
      <img id="previewLight" src="" alt="" />
      <span>Sur fond blanc</span>
    </div>
  </div>

  <canvas id="canvas"></canvas>

  <button class="btn-dl" id="btnDownload">⬇ Télécharger logo-transparent.png</button>
  <div class="status" id="status">✅ Traitement terminé ! Enregistrez le fichier comme <strong>logo.png</strong> dans le dossier <strong>images/</strong></div>

  <script>
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.src = 'images/logo.svg';

    img.onload = function() {
      const canvas = document.getElementById('canvas');
      canvas.width  = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;

      // Rendre les pixels proches du blanc transparents
      const threshold = 240;
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i+1], b = data[i+2];
        if (r >= threshold && g >= threshold && b >= threshold) {
          data[i+3] = 0; // alpha = 0 (transparent)
        }
      }
      ctx.putImageData(imageData, 0, 0);

      const url = canvas.toDataURL('image/png');
      document.getElementById('previewDark').src  = url;
      document.getElementById('previewLight').src = url;

      document.getElementById('btnDownload').addEventListener('click', () => {
        const a = document.createElement('a');
        a.href     = url;
        a.download = 'logo-transparent.png';
        a.click();
        document.getElementById('status').style.display = 'block';
      });
    };

    img.onerror = function() {
      document.querySelector('p').textContent = '⚠️ Logo non trouvé. Assurez-vous que images/logo.svg existe.';
    };
  </script>
</body>
</html>
